---
version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: "Per-node data (by certname)"
    path: "nodes/%{trusted.certname}.yaml"

  - name: "Per-role data (from CSR attributes)"
    path: "roles/%{trusted.extensions.pp_role}.yaml"

  - name: "Common data"
    path: "common.yaml"
